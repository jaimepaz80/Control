<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROL | Auditoría Acuícola</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, writeBatch, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBXIeNjqNmCL4QrgoRjC5AV8dgEjoy95Vo",
            authDomain: "control-5e855.firebaseapp.com",
            projectId: "control-5e855",
            storageBucket: "control-5e855.firebasestorage.app",
            messagingSenderId: "947274462816",
            appId: "1:947274462816:web:45f6a4709992b4d6f8b505"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let todosLosRegistros = [];
        let miGrafica = null;

        window.guardarRegistro = async () => {
            const fechaHoraInput = document.getElementById('fecha_hora').value;
            if (!fechaHoraInput) {
                alert("Por favor, selecciona una Fecha y Hora válida.");
                return;
            }

            const data = {
                sistema: document.getElementById('sistema').value,
                fecha_hora: fechaHoraInput,
                ph: document.getElementById('ph').value || "",
                amonio: document.getElementById('amonio').value || "",
                nitrito: document.getElementById('nitrito').value || "",
                nitrato: document.getElementById('nitrato').value || "",
                salinidad: document.getElementById('salinidad').value || "",
                temp: document.getElementById('temp').value || "",
                o2: document.getElementById('o2').value || "",
                alcalinidad: document.getElementById('alcalinidad').value || "",
                tds: document.getElementById('tds').value || "",
                timestamp: new Date().getTime()
            };

            try {
                await addDoc(collection(db, "registros_control"), data);
                alert("Dato ingresado con éxito.");
                limpiarFormulario();
                await cargarDatos();
            } catch (e) {
                alert("Error crítico al guardar en Firebase: " + e.message);
            }
        };

        function limpiarFormulario() {
            const inputs = document.querySelectorAll('#formularioParametros input[type="number"]');
            inputs.forEach(input => input.value = "");
            document.getElementById('tds').value = "";
        }

        async function cargarDatos() {
            try {
                const q = query(collection(db, "registros_control"), orderBy("fecha_hora", "desc"));
                const snapshot = await getDocs(q);
                todosLosRegistros = [];
                
                snapshot.forEach(doc => {
                    todosLosRegistros.push(doc.data());
                });

                aplicarFiltrosYRenderizar();
            } catch (error) {
                console.error("Error al cargar datos: ", error);
            }
        }

        window.aplicarFiltrosYRenderizar = () => {
            const fechaInicio = document.getElementById('filtro_inicio').value;
            const fechaFin = document.getElementById('filtro_fin').value;
            const filtroSistema = document.getElementById('filtro_sistema').value;
            const tbody = document.getElementById('tablaBody');
            
            tbody.innerHTML = "";

            const registrosFiltrados = todosLosRegistros.filter(d => {
                if (fechaInicio && d.fecha_hora < fechaInicio) return false;
                if (fechaFin && d.fecha_hora > fechaFin) return false;
                if (filtroSistema !== "Todos" && d.sistema !== filtroSistema) return false;
                return true;
            });

            registrosFiltrados.forEach(d => {
                tbody.innerHTML += `
                    <tr class="border-b border-gray-800 hover:bg-gray-800/50 transition text-sm">
                        <td class="p-3 font-mono text-xs text-gray-400 whitespace-nowrap">${d.fecha_hora.replace('T', ' ')}</td>
                        <td class="p-3 font-bold ${d.sistema === 'Engorde' ? 'text-orange-400' : 'text-blue-400'}">${d.sistema}</td>
                        <td class="p-3 text-center">${d.ph || '-'}</td>
                        <td class="p-3 text-center text-emerald-400">${d.amonio || '-'}</td>
                        <td class="p-3 text-center text-amber-400">${d.nitrito || '-'}</td>
                        <td class="p-3 text-center text-orange-400">${d.nitrato || '-'}</td>
                        <td class="p-3 text-center">${d.salinidad || '-'}</td>
                        <td class="p-3 text-center text-cyan-400">${d.temp ? d.temp + '°C' : '-'}</td>
                        <td class="p-3 text-center text-blue-300">${d.o2 || '-'}</td>
                        <td class="p-3 text-center text-purple-400">${d.alcalinidad || '-'}</td>
                        <td class="p-3 text-center">${d.tds || '-'}</td>
                    </tr>`;
            });

            if (registrosFiltrados.length === 0) {
                tbody.innerHTML = `<tr><td colspan="11" class="p-6 text-center text-gray-500">No se encontraron registros para el rango seleccionado.</td></tr>`;
            }

            renderizarGrafica(registrosFiltrados);
        };

        // LÓGICA DE GRÁFICAS Y TRATAMIENTO DE ESPACIOS
        function renderizarGrafica(datos) {
            const ctx = document.getElementById('canvasGrafica');
            if (!ctx) return;
            
            const parametro = document.getElementById('selectParametroGrafica').value;
            
            // Reordenar temporalmente ascendente solo para la gráfica (cronología correcta)
            const datosGrafica = [...datos].sort((a, b) => a.fecha_hora.localeCompare(b.fecha_hora));
            
            const labels = datosGrafica.map(d => d.fecha_hora.replace('T', ' '));
            const valores = datosGrafica.map(d => {
                const val = parseFloat(d[parametro]);
                return isNaN(val) ? null : val; // Transforma vacíos en nulos para no graficar 0.00
            });

            if (miGrafica) miGrafica.destroy();

            miGrafica = new Chart(ctx.getContext('2d'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: parametro.toUpperCase(),
                        data: valores,
                        borderColor: '#06b6d4', 
                        backgroundColor: 'rgba(6, 182, 212, 0.1)',
                        borderWidth: 2,
                        tension: 0.3,
                        spanGaps: true // Ignora los nulos y conecta los puntos existentes
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#9ca3af' } } },
                    scales: {
                        y: { ticks: { color: '#9ca3af' }, grid: { color: '#374151' } },
                        x: { ticks: { color: '#9ca3af', maxTicksLimit: 10 }, grid: { color: '#374151' } }
                    }
                }
            });
        }

        // CARGA MASIVA DE EXCEL
        window.procesarExcel = (event) => {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                
                // defval: "" fuerza a que las celdas vacías no devuelvan undefined, sino un string en blanco
                const jsonData = XLSX.utils.sheet_to_json(firstSheet, { defval: "" }); 

                if (confirm(`Se detectaron ${jsonData.length} registros en el Excel. ¿Subir a la base de datos?`)) {
                    const batch = writeBatch(db); // Optimiza la subida masiva a Firebase
                    
                    jsonData.forEach(row => {
                        const docRef = doc(collection(db, "registros_control"));
                        batch.set(docRef, {
                            fecha_hora: row["Fecha y Hora"] ? row["Fecha y Hora"].replace(' ', 'T') : "",
                            sistema: row["Sistema"] || "Pre-cría",
                            ph: row["pH"] === "" ? "" : String(row["pH"]),
                            amonio: row["Amonio (ppm)"] === "" ? "" : String(row["Amonio (ppm)"]),
                            nitrito: row["Nitrito (ppm)"] === "" ? "" : String(row["Nitrito (ppm)"]),
                            nitrato: row["Nitrato (ppm)"] === "" ? "" : String(row["Nitrato (ppm)"]),
                            salinidad: row["Salinidad (ppt)"] === "" ? "" : String(row["Salinidad (ppt)"]),
                            temp: row["Temperatura (°C)"] === "" ? "" : String(row["Temperatura (°C)"]),
                            o2: row["Oxígeno O2 (mg/L)"] === "" ? "" : String(row["Oxígeno O2 (mg/L)"]),
                            alcalinidad: row["Alcalinidad (ppm)"] === "" ? "" : String(row["Alcalinidad (ppm)"]),
                            tds: row["TDS"] === "" ? "" : String(row["TDS"]),
                            timestamp: new Date().getTime()
                        });
                    });

                    try {
                        await batch.commit();
                        alert("Importación histórica completada con éxito.");
                        cargarDatos();
                    } catch (error) {
                        alert("Error al importar: " + error.message);
                    }
                }
            };
            reader.readAsArrayBuffer(file);
        };

        window.descargarExcel = () => {
            const fechaInicio = document.getElementById('filtro_inicio').value;
            const fechaFin = document.getElementById('filtro_fin').value;
            const filtroSistema = document.getElementById('filtro_sistema').value;

            const chk_ph = document.getElementById('chk_ph').checked;
            const chk_amonio = document.getElementById('chk_amonio').checked;
            const chk_nitrito = document.getElementById('chk_nitrito').checked;
            const chk_nitrato = document.getElementById('chk_nitrato').checked;
            const chk_salinidad = document.getElementById('chk_salinidad').checked;
            const chk_temp = document.getElementById('chk_temp').checked;
            const chk_o2 = document.getElementById('chk_o2').checked;
            const chk_alcalinidad = document.getElementById('chk_alcalinidad').checked;
            const chk_tds = document.getElementById('chk_tds').checked;

            const registrosFiltrados = todosLosRegistros.filter(d => {
                if (fechaInicio && d.fecha_hora < fechaInicio) return false;
                if (fechaFin && d.fecha_hora > fechaFin) return false;
                if (filtroSistema !== "Todos" && d.sistema !== filtroSistema) return false;
                return true;
            });

            if (registrosFiltrados.length === 0) {
                alert("No hay datos en el rango seleccionado para exportar.");
                return;
            }

            const matrizExcel = registrosFiltrados.map(d => {
                let fila = {
                    "Fecha y Hora": d.fecha_hora.replace('T', ' '),
                    "Sistema": d.sistema
                };
                
                if (chk_ph) fila["pH"] = d.ph;
                if (chk_amonio) fila["Amonio (ppm)"] = d.amonio;
                if (chk_nitrito) fila["Nitrito (ppm)"] = d.nitrito;
                if (chk_nitrato) fila["Nitrato (ppm)"] = d.nitrato;
                if (chk_salinidad) fila["Salinidad (ppt)"] = d.salinidad;
                if (chk_temp) fila["Temperatura (°C)"] = d.temp;
                if (chk_o2) fila["Oxígeno O2 (mg/L)"] = d.o2;
                if (chk_alcalinidad) fila["Alcalinidad (ppm)"] = d.alcalinidad;
                if (chk_tds) fila["TDS"] = d.tds;

                return fila;
            });

            const hoja = XLSX.utils.json_to_sheet(matrizExcel);
            const libro = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(libro, hoja, "Reporte Filtrado");
            
            XLSX.writeFile(libro, `Reporte_Acuicola_${new Date().toISOString().slice(0, 10)}.xlsx`);
        };

        window.addEventListener('DOMContentLoaded', () => {
            const ahora = new Date();
            ahora.setMinutes(ahora.getMinutes() - ahora.getTimezoneOffset());
            document.getElementById('fecha_hora').value = ahora.toISOString().slice(0, 16);
            cargarDatos();
        });
    </script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans">
    
    <header class="bg-gray-900 border-b border-blue-900 p-6 shadow-2xl flex flex-col md:flex-row justify-between md:items-center gap-4">
        <div>
            <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300">CONTROL</h1>
            <p class="text-gray-500 text-sm uppercase tracking-widest">Auditoría Técnica Acuícola</p>
        </div>
        <div>
            <label class="bg-gray-800 hover:bg-gray-700 text-xs px-4 py-2 rounded cursor-pointer border border-gray-600 transition text-white inline-block shadow">
                <span>📁 IMPORTAR EXCEL HISTÓRICO</span>
                <input type="file" class="hidden" accept=".xlsx, .csv" onchange="procesarExcel(event)">
            </label>
        </div>
    </header>

    <main class="p-4 md:p-8 max-w-7xl mx-auto space-y-8">
        
        <section id="formularioParametros" class="bg-gray-900 p-6 rounded-xl border border-gray-800 shadow-xl">
            <h2 class="text-xl font-bold mb-6 border-l-4 border-blue-600 pl-3">Ingreso de Parámetros</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <select id="sistema" class="bg-gray-800 p-3 rounded border border-gray-700 text-white w-full focus:outline-none focus:border-blue-500">
                    <option value="Pre-cría">Pre-cría</option>
                    <option value="Engorde">Engorde</option>
                </select>
                <input type="datetime-local" id="fecha_hora" class="bg-gray-800 p-3 rounded border border-gray-700 col-span-1 md:col-span-3 text-white focus:outline-none focus:border-blue-500">
                <input type="number" step="0.01" id="ph" placeholder="pH" class="bg-gray-800 p-3 rounded border border-gray-700 text-white placeholder-gray-500">
                <input type="number" step="0.01" id="amonio" placeholder="Amonio (ppm)" class="bg-gray-800 p-3 rounded border border-gray-700 text-white placeholder-gray-500">
                <input type="number" step="0.01" id="nitrito" placeholder="Nitrito (ppm)" class="bg-gray-800 p-3 rounded border border-gray-700 text-white placeholder-gray-500">
                <input type="number" step="0.01" id="nitrato" placeholder="Nitrato (ppm)" class="bg-gray-800 p-3 rounded border border-gray-700 text-white placeholder-gray-500">
                <input type="number" step="0.01" id="salinidad" placeholder="Salinidad (ppt)" class="bg-gray-800 p-3 rounded border border-gray-700 text-white placeholder-gray-500">
                <input type="number" step="0.1" id="temp" placeholder="Temp (°C)" class="bg-gray-800 p-3 rounded border border-gray-700 text-white placeholder-gray-500">
                <input type="number" step="0.01" id="o2" placeholder="O2 (mg/L)" class="bg-gray-800 p-3 rounded border border-gray-700 text-white placeholder-gray-500">
                <input type="number" step="1" id="alcalinidad" placeholder="Alc / Bicarbonato (ppm)" class="bg-gray-800 p-3 rounded border border-gray-700 text-white placeholder-gray-500">
                <input type="number" step="1" id="tds" placeholder="TDS (Sólidos Disueltos)" class="bg-gray-800 p-3 rounded border border-gray-700 text-white placeholder-gray-500 md:col-span-4">
                <button onclick="guardarRegistro()" class="md:col-span-4 bg-blue-700 hover:bg-blue-600 text-white font-bold py-4 rounded transition shadow-lg tracking-wider">GUARDAR REGISTRO TÉCNICO</button>
            </div>
        </section>

        <section class="bg-gray-900 p-6 rounded-xl border border-gray-800 shadow-xl block w-full">
            <h2 class="text-xl font-bold mb-4 border-l-4 border-cyan-500 pl-3">Filtros y Generación de Reportes</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div class="w-full">
                    <label class="block text-gray-400 text-xs uppercase mb-2">Sistema</label>
                    <select id="filtro_sistema" onchange="aplicarFiltrosYRenderizar()" class="bg-gray-800 p-3 rounded border border-gray-700 text-white w-full focus:outline-none focus:border-cyan-500">
                        <option value="Todos">Todos</option>
                        <option value="Pre-cría">Pre-cría</option>
                        <option value="Engorde">Engorde</option>
                    </select>
                </div>
                <div class="w-full">
                    <label class="block text-gray-400 text-xs uppercase mb-2">Fecha/Hora Inicio</label>
                    <input type="datetime-local" id="filtro_inicio" onchange="aplicarFiltrosYRenderizar()" class="bg-gray-800 p-3 rounded border border-gray-700 text-white w-full focus:outline-none focus:border-cyan-500">
                </div>
                <div class="w-full">
                    <label class="block text-gray-400 text-xs uppercase mb-2">Fecha/Hora Fin</label>
                    <input type="datetime-local" id="filtro_fin" onchange="aplicarFiltrosYRenderizar()" class="bg-gray-800 p-3 rounded border border-gray-700 text-white w-full focus:outline-none focus:border-cyan-500">
                </div>
                <button onclick="descargarExcel()" class="w-full bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white font-bold py-3 px-4 rounded transition shadow-md flex items-center justify-center">
                    DESCARGAR EXCEL (.XLSX)
                </button>
            </div>

            <div class="mt-6 p-4 bg-gray-850 rounded border border-gray-700 block w-full">
                <label class="block text-gray-300 text-sm font-bold mb-3 border-b border-gray-700 pb-2">Selecciona los parámetros para el reporte Excel:</label>
                <div class="flex flex-wrap gap-4 text-sm text-gray-400">
                    <label class="flex items-center space-x-2 cursor-pointer hover:text-white"><input type="checkbox" id="chk_ph" checked class="w-5 h-5 accent-cyan-500"> <span>pH</span></label>
                    <label class="flex items-center space-x-2 cursor-pointer hover:text-white"><input type="checkbox" id="chk_amonio" checked class="w-5 h-5 accent-cyan-500"> <span>Amonio</span></label>
                    <label class="flex items-center space-x-2 cursor-pointer hover:text-white"><input type="checkbox" id="chk_nitrito" checked class="w-5 h-5 accent-cyan-500"> <span>Nitrito</span></label>
                    <label class="flex items-center space-x-2 cursor-pointer hover:text-white"><input type="checkbox" id="chk_nitrato" checked class="w-5 h-5 accent-cyan-500"> <span>Nitrato</span></label>
                    <label class="flex items-center space-x-2 cursor-pointer hover:text-white"><input type="checkbox" id="chk_salinidad" checked class="w-5 h-5 accent-cyan-500"> <span>Salinidad</span></label>
                    <label class="flex items-center space-x-2 cursor-pointer hover:text-white"><input type="checkbox" id="chk_temp" checked class="w-5 h-5 accent-cyan-500"> <span>Temp</span></label>
                    <label class="flex items-center space-x-2 cursor-pointer hover:text-white"><input type="checkbox" id="chk_o2" checked class="w-5 h-5 accent-cyan-500"> <span>O2</span></label>
                    <label class="flex items-center space-x-2 cursor-pointer hover:text-white"><input type="checkbox" id="chk_alcalinidad" checked class="w-5 h-5 accent-cyan-500"> <span>Alcalinidad</span></label>
                    <label class="flex items-center space-x-2 cursor-pointer hover:text-white"><input type="checkbox" id="chk_tds" checked class="w-5 h-5 accent-cyan-500"> <span>TDS</span></label>
                </div>
            </div>
        </section>

        <section class="bg-gray-900 p-6 rounded-xl border border-gray-800 shadow-xl block w-full">
            <div class="flex flex-col md:flex-row justify-between items-center mb-4">
                <h2 class="text-xl font-bold border-l-4 border-cyan-500 pl-3">Tendencia de Parámetros</h2>
                <select id="selectParametroGrafica" onchange="aplicarFiltrosYRenderizar()" class="bg-gray-800 p-2 rounded border border-gray-700 text-sm text-white focus:outline-none focus:border-cyan-500 mt-4 md:mt-0">
                    <option value="ph">pH</option>
                    <option value="amonio">Amonio</option>
                    <option value="nitrito">Nitrito</option>
                    <option value="nitrato">Nitrato</option>
                    <option value="salinidad">Salinidad</option>
                    <option value="temp">Temperatura</option>
                    <option value="o2">Oxígeno</option>
                    <option value="alcalinidad">Alcalinidad</option>
                </select>
            </div>
            <div class="h-80 w-full">
                <canvas id="canvasGrafica"></canvas>
            </div>
        </section>

        <section class="bg-gray-900 rounded-xl border border-gray-800 shadow-xl overflow-hidden block w-full">
            <div class="p-6 border-b border-gray-800 bg-gray-850">
                <h2 class="text-xl font-bold">Bitácora Global de Eventos</h2>
            </div>
            <div class="overflow-x-auto w-full">
                <table class="w-full text-left border-collapse min-w-[800px]">
                    <thead class="bg-gray-850 text-gray-400 text-xs uppercase tracking-wider border-b border-gray-800">
                        <tr>
                            <th class="p-3 whitespace-nowrap">Fecha / Hora</th>
                            <th class="p-3">Sistema</th>
                            <th class="p-3 text-center">pH</th>
                            <th class="p-3 text-center">NH4</th>
                            <th class="p-3 text-center">NO2</th>
                            <th class="p-3 text-center">NO3</th>
                            <th class="p-3 text-center">Sal</th>
                            <th class="p-3 text-center">Temp</th>
                            <th class="p-3 text-center">O2</th>
                            <th class="p-3 text-center">Alc</th>
                            <th class="p-3 text-center">TDS</th>
                        </tr>
                    </thead>
                    <tbody id="tablaBody" class="divide-y divide-gray-850 bg-gray-900">
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</body>
</html>
