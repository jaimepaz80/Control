<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROL | Auditoría Acuícola</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Configuración de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBXIeNjqNmCL4QrgoRjC5AV8dgEjoy95Vo",
            authDomain: "control-5e855.firebaseapp.com",
            projectId: "control-5e855",
            storageBucket: "control-5e855.firebasestorage.app",
            messagingSenderId: "947274462816",
            appId: "1:947274462816:web:45f6a4709992b4d6f8b505"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Almacenamiento local temporal
        let todosLosRegistros = [];

        // GUARDAR REGISTRO
        window.guardarRegistro = async () => {
            const fechaHoraInput = document.getElementById('fecha_hora').value;
            if (!fechaHoraInput) {
                alert("Por favor, selecciona una Fecha y Hora válida.");
                return;
            }

            const data = {
                sistema: document.getElementById('sistema').value,
                fecha_hora: fechaHoraInput,
                ph: document.getElementById('ph').value || "-",
                amonio: document.getElementById('amonio').value || "-",
                nitrito: document.getElementById('nitrito').value || "-",
                nitrato: document.getElementById('nitrato').value || "-",
                salinidad: document.getElementById('salinidad').value || "-",
                temp: document.getElementById('temp').value || "-",
                o2: document.getElementById('o2').value || "-",
                alcalinidad: document.getElementById('alcalinidad').value || "-",
                tds: document.getElementById('tds').value || "-",
                timestamp: new Date().getTime()
            };

            try {
                await addDoc(collection(db, "registros_control"), data);
                alert("Dato ingresado con éxito.");
                limpiarFormulario();
                await cargarDatos();
            } catch (e) {
                alert("Error crítico al guardar en Firebase: " + e.message);
            }
        };

        // LIMPIAR CAMPOS DEL FORMULARIO
        function limpiarFormulario() {
            const inputs = document.querySelectorAll('#formularioParametros input[type="number"]');
            inputs.forEach(input => input.value = "");
            document.getElementById('tds').value = "";
        }

        // CARGAR Y RENDERIZAR DATOS EN PANTALLA
        async function cargarDatos() {
            try {
                const q = query(collection(db, "registros_control"), orderBy("fecha_hora", "desc"));
                const snapshot = await getDocs(q);
                todosLosRegistros = [];
                
                snapshot.forEach(doc => {
                    todosLosRegistros.push(doc.data());
                });

                aplicarFiltrosYRenderizar();
            } catch (error) {
                console.error("Error al cargar datos: ", error);
            }
        }

        // APLICAR FILTROS EN TABLA
        window.aplicarFiltrosYRenderizar = () => {
            const fechaInicio = document.getElementById('filtro_inicio').value;
            const fechaFin = document.getElementById('filtro_fin').value;
            const tbody = document.getElementById('tablaBody');
            
            tbody.innerHTML = "";

            const registrosFiltrados = todosLosRegistros.filter(d => {
                if (fechaInicio && d.fecha_hora < fechaInicio) return false;
                if (fechaFin && d.fecha_hora > fechaFin) return false;
                return true;
            });

            registrosFiltrados.forEach(d => {
                tbody.innerHTML += `
                    <tr class="border-b border-gray-800 hover:bg-gray-800/50 transition text-sm">
                        <td class="p-3 font-mono text-xs text-gray-400 whitespace-nowrap">${d.fecha_hora.replace('T', ' ')}</td>
                        <td class="p-3 font-bold text-blue-400">${d.sistema}</td>
                        <td class="p-3 text-center">${d.ph}</td>
                        <td class="p-3 text-center text-emerald-400">${d.amonio}</td>
                        <td class="p-3 text-center text-amber-400">${d.nitrito}</td>
                        <td class="p-3 text-center text-orange-400">${d.nitrato}</td>
                        <td class="p-3 text-center">${d.salinidad}</td>
                        <td class="p-3 text-center text-cyan-400">${d.temp}°C</td>
                        <td class="p-3 text-center text-blue-300">${d.o2}</td>
                        <td class="p-3 text-center text-purple-400">${d.alcalinidad}</td>
                        <td class="p-3 text-center">${d.tds}</td>
                    </tr>`;
            });

            if (registrosFiltrados.length === 0) {
                tbody.innerHTML = `<tr><td colspan="11" class="p-6 text-center text-gray-500">No se encontraron registros para el rango seleccionado.</td></tr>`;
            }
        };

        // EXPORTACIÓN A EXCEL CON SELECCIÓN DE PARÁMETROS
        window.descargarExcel = () => {
            const fechaInicio = document.getElementById('filtro_inicio').value;
            const fechaFin = document.getElementById('filtro_fin').value;

            // Leer estado de los checkboxes
            const chk_ph = document.getElementById('chk_ph').checked;
            const chk_amonio = document.getElementById('chk_amonio').checked;
            const chk_nitrito = document.getElementById('chk_nitrito').checked;
            const chk_nitrato = document.getElementById('chk_nitrato').checked;
            const chk_salinidad = document.getElementById('chk_salinidad').checked;
            const chk_temp = document.getElementById('chk_temp').checked;
            const chk_o2 = document.getElementById('chk_o2').checked;
            const chk_alcalinidad = document.getElementById('chk_alcalinidad').checked;
            const chk_tds = document.getElementById('chk_tds').checked;

            const registrosFiltrados = todosLosRegistros.filter(d => {
                if (fechaInicio && d.fecha_hora < fechaInicio) return false;
                if (fechaFin && d.fecha_hora > fechaFin) return false;
                return true;
            });

            if (registrosFiltrados.length === 0) {
                alert("No hay datos en el rango seleccionado para exportar.");
                return;
            }

            // Mapeo dinámico de columnas según selección del usuario
            const matrizExcel = registrosFiltrados.map(d => {
                let fila = {
                    "Fecha y Hora": d.fecha_hora.replace('T', ' '),
                    "Sistema": d.sistema
                };
                
                // Agregar solo los parámetros seleccionados
                if (chk_ph) fila["pH"] = d.ph;
                if (chk_amonio) fila["Amonio (ppm)"] = d.amonio;
                if (chk_nitrito) fila["Nitrito (ppm)"] = d.nitrito;
                if (chk_nitrato) fila["Nitrato (ppm)"] = d.nitrato;
                if (chk_salinidad) fila["Salinidad (ppt)"] = d.salinidad;
                if (chk_temp) fila["Temperatura (°C)"] = d.temp;
                if (chk_o2) fila["Oxígeno O2 (mg/L)"] = d.o2;
                if (chk_alcalinidad) fila["Alcalinidad (ppm)"] = d.alcalinidad;
                if (chk_tds) fila["TDS"] = d.tds;

                return fila;
            });

            const hoja = XLSX.utils.json_to_sheet(matrizExcel);
            const libro = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(libro, hoja, "Reporte Filtrado");
            
            XLSX.writeFile(libro, `Reporte_Personalizado_${new Date().toISOString().slice(0, 10)}.xlsx`);
        };

        window.addEventListener('DOMContentLoaded', () => {
            const ahora = new Date();
            ahora.setMinutes(ahora.getMinutes() - ahora.getTimezoneOffset());
            document.getElementById('fecha_hora').value = ahora.toISOString().slice(0, 16);
            cargarDatos();
        });
    </script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans">
    
    <header class="bg-gray-900 border-b border-blue-900 p-6 shadow-2xl">
        <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300">CONTROL</h1>
        <p class="text-gray-500 text-sm uppercase tracking-widest">Auditoría Técnica Acuícola</p>
    </header>

    <main class="p-4 md:p-8 max-w-7xl mx-auto space-y-8">
        
        <section id="formularioParametros" class="bg-gray-900 p-6 rounded-xl border border-gray-800 shadow-xl">
            <h2 class="text-xl font-bold mb-6 border-l-4 border-blue-600 pl-3">Ingreso de Parámetros</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <select id="sistema" class="bg-gray-800 p-3 rounded border border-gray-700 text-white w-full focus:outline-none focus:border-blue-500">
                    <option value="Pre-cría">Pre-cría</option>
                    <option value="Engorde">Engorde</option>
                </select>
                <input type="datetime-local" id="fecha_hora" class="bg-gray-800 p-3 rounded border border-gray-700 col-span-1 md:col-span-3 text-white focus:outline-none focus:border-blue-500">
                <input type="number" step="0.01" id="ph" placeholder="pH" class="bg-gray-800 p-3 rounded border border-gray-700 text-white placeholder-gray-500">
                <input type="number" step="0.01" id="amonio" placeholder="Amonio (ppm)" class="bg-gray-800 p-3 rounded border border-gray-700 text-white placeholder-gray-500">
                <input type="number" step="0.01" id="nitrito" placeholder="Nitrito (ppm)" class="bg-gray-800 p-3 rounded border border-gray-700 text-white placeholder-gray-500">
                <input type="number" step="0.01" id="nitrato" placeholder="Nitrato (ppm)" class="bg-gray-800 p-3 rounded border border-gray-700 text-white placeholder-gray-500">
                <input type="number" step="0.01" id="salinidad" placeholder="Salinidad (ppt)" class="bg-gray-800 p-3 rounded border border-gray-700 text-white placeholder-gray-500">
                <input type="number" step="0.1" id="temp" placeholder="Temp (°C)" class="bg-gray-800 p-3 rounded border border-gray-700 text-white placeholder-gray-500">
                <input type="number" step="0.01" id="o2" placeholder="O2 (mg/L)" class="bg-gray-800 p-3 rounded border border-gray-700 text-white placeholder-gray-500">
                <input type="number" step="1" id="alcalinidad" placeholder="Alc / Bicarbonato (ppm)" class="bg-gray-800 p-3 rounded border border-gray-700 text-white placeholder-gray-500">
                <input type="number" step="1" id="tds" placeholder="TDS (Sólidos Disueltos)" class="bg-gray-800 p-3 rounded border border-gray-700 text-white placeholder-gray-500 md:col-span-4">
                <button onclick="guardarRegistro()" class="md:col-span-4 bg-blue-700 hover:bg-blue-600 text-white font-bold py-4 rounded transition shadow-lg tracking-wider">GUARDAR REGISTRO TÉCNICO</button>
            </div>
        </section>

        <section class="bg-gray-900 p-6 rounded-xl border border-gray-800 shadow-xl">
            <h2 class="text-xl font-bold mb-4 border-l-4 border-cyan-500 pl-3">Filtros y Generación de Reportes</h2>
            
            <div class="grid grid-cols-1 md
