<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GNSSJP PRO - Control Acuícola</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBXIeNjqNmCL4QrgoRjC5AV8dgEjoy95Vo",
            authDomain: "control-5e855.firebaseapp.com",
            projectId: "control-5e855",
            storageBucket: "control-5e855.firebasestorage.app",
            messagingSenderId: "947274462816",
            appId: "1:947274462816:web:45f6a4709992b4d6f8b505"
        };

        const db = getFirestore(initializeApp(firebaseConfig));

        // GUARDAR MANUAL
        window.guardarRegistro = async () => {
            const data = {
                fecha: document.getElementById('fecha').value,
                ph: parseFloat(document.getElementById('ph').value),
                amonio: parseFloat(document.getElementById('amonio').value),
                temp: parseFloat(document.getElementById('temp').value),
                timestamp: new Date()
            };
            await addDoc(collection(db, "registros_agua"), data);
            alert("Guardado con éxito");
            cargarTabla();
        };

        // EXPORTAR A EXCEL
        window.descargarExcel = async () => {
            const snapshot = await getDocs(query(collection(db, "registros_agua"), orderBy("fecha")));
            const data = snapshot.docs.map(doc => doc.data());
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Historial");
            XLSX.writeFile(wb, "Reporte_Calidad_Agua.xlsx");
        };

        // CARGAR TABLA INICIAL
        async function cargarTabla() {
            const snapshot = await getDocs(query(collection(db, "registros_agua"), orderBy("fecha", "desc")));
            const tbody = document.getElementById('tablaBody');
            tbody.innerHTML = '';
            snapshot.forEach(doc => {
                const d = doc.data();
                tbody.innerHTML += `<tr class="border-b border-gray-700">
                    <td class="p-2">${d.fecha}</td><td class="p-2">${d.ph}</td>
                    <td class="p-2">${d.amonio}</td><td class="p-2">${d.temp}</td>
                </tr>`;
            });
        }
        cargarTabla();
    </script>
</head>
<body class="bg-gray-900 text-white p-4">
    <h1 class="text-2xl font-bold mb-4 text-blue-400">Panel GNSSJP PRO</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="bg-gray-800 p-4 rounded shadow">
            <input type="date" id="fecha" class="w-full p-2 mb-2 bg-gray-700 rounded">
            <input type="number" id="ph" placeholder="pH" class="w-full p-2 mb-2 bg-gray-700 rounded">
            <input type="number" id="amonio" placeholder="Amonio" class="w-full p-2 mb-2 bg-gray-700 rounded">
            <input type="number" id="temp" placeholder="Temp" class="w-full p-2 mb-2 bg-gray-700 rounded">
            <button onclick="guardarRegistro()" class="w-full bg-blue-600 p-2 rounded">Guardar</button>
        </div>

        <div class="md:col-span-2 bg-gray-800 p-4 rounded shadow overflow-x-auto">
            <button onclick="descargarExcel()" class="mb-2 bg-green-600 p-2 rounded text-sm">Descargar Excel</button>
            <table class="w-full text-left">
                <thead><tr><th>Fecha</th><th>pH</th><th>Amonio</th><th>Temp</th></tr></thead>
                <tbody id="tablaBody"></tbody>
            </table>
        </div>
    </div>
</body>
</html>
